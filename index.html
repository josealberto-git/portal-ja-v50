<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Completo</title>
<style>
body {
  font-family: Arial;
  color:#fff;
  background: url('20241231_234354.jpg') no-repeat center center fixed;
  background-size: cover;
}
.container {width:320px; margin:80px auto; background:rgba(0,0,0,0.7); padding:20px; border-radius:10px;}
input, button, select {width:100%; padding:10px; margin:5px 0;}
button {cursor:pointer;}
.top-buttons {position:fixed; top:10px; right:10px;}
#painel, #clienteArea {display:none;}
</style>
</head>
<body>

<div class="top-buttons">
<button onclick="mostrarCliente()">Área do Cliente</button>
<button onclick="mostrarPainel()">Painel Admin</button>
</div>

<div class="container" id="login">
<h2>Login</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="fazerLogin()">Entrar</button>
<button onclick="esqueciSenha()">Esqueci senha</button>
<button onclick="suporte()">Suporte</button>
</div>

<div class="container" id="painel">
<h2>Painel</h2>
<p id="permissoes"></p>

<h3>Usuários</h3>
<ul id="lista"></ul>

<h3>Criar usuário (admin+)</h3>
<input id="novoUser" placeholder="Usuário">
<input id="novaSenha" placeholder="Senha">
<select id="tipoUser">
<option value="cliente">Cliente</option>
<option value="editor">Editor</option>
</select>
<button onclick="criarUser()">Criar</button>

<h3>Pedidos de reset</h3>
<ul id="pedidos"></ul>

<h3>Mensagens suporte</h3>
<ul id="msgs"></ul>

<button onclick="logout()">Sair</button>
</div>

<div class="container" id="clienteArea">
<h2>Área do Cliente</h2>
<p>IP: <span id="ip"></span></p>
<p>Jogo: Minecraft ativo</p>
<button onclick="trocarSenha()">Trocar senha</button>
<button onclick="logout()">Sair</button>
</div>

<script>
// ELEMENTOS
const elLogin = document.getElementById('login');
const elPainel = document.getElementById('painel');
const elCliente = document.getElementById('clienteArea');
const elUser = document.getElementById('user');
const elPass = document.getElementById('pass');
const elLista = document.getElementById('lista');
const elPerm = document.getElementById('permissoes');
const elNovoUser = document.getElementById('novoUser');
const elNovaSenha = document.getElementById('novaSenha');
const elTipoUser = document.getElementById('tipoUser');
const elIP = document.getElementById('ip');
const elPedidos = document.getElementById('pedidos');
const elMsgs = document.getElementById('msgs');

// BANCO LOCAL (simulação)
let usuarios;
try {
  usuarios = JSON.parse(localStorage.getItem('usuarios')) || [
    {user:'master', pass:'123', tipo:'master'},
    {user:'admin', pass:'123', tipo:'admin'},
    {user:'editor', pass:'123', tipo:'editor'},
    {user:'cliente', pass:'123', tipo:'cliente'}
  ];
} catch(e) {
  localStorage.removeItem('usuarios');
  usuarios = [
    {user:'master', pass:'123', tipo:'master'},
    {user:'admin', pass:'123', tipo:'admin'},
    {user:'editor', pass:'123', tipo:'editor'},
    {user:'cliente', pass:'123', tipo:'cliente'}
  ];
}
{user:'master', pass:'123', tipo:'master'},
{user:'admin', pass:'123', tipo:'admin'},
{user:'editor', pass:'123', tipo:'editor'},
{user:'cliente', pass:'123', tipo:'cliente'}
];

let pedidosReset = JSON.parse(localStorage.getItem('pedidos')) || [];
let mensagens = JSON.parse(localStorage.getItem('msgs')) || [];
let logado = null;

function salvar(){
localStorage.setItem('usuarios', JSON.stringify(usuarios));
localStorage.setItem('pedidos', JSON.stringify(pedidosReset));
localStorage.setItem('msgs', JSON.stringify(mensagens));
}

function fazerLogin(){
let u = elUser.value;
let p = elPass.value;
let achou = usuarios.find(x=>x.user===u && x.pass===p);
if(achou){logado=achou; alert('Logado');}
else alert('Erro');
}

function mostrarPainel(){
if(!logado) return alert('Login primeiro');
if(logado.tipo==='cliente') return alert('Sem acesso');

elLogin.style.display='none';
elPainel.style.display='block';
elPerm.innerText='Permissão: '+logado.tipo;
listar();
mostrarExtras();
}

function listar(){
elLista.innerHTML='';
usuarios.forEach((u,i)=>{
let li=document.createElement('li');
li.innerHTML=`${u.user} (${u.tipo}) - senha: ${logado.tipo==='master'?u.pass:'***'}
<button onclick="reset(${i})">Reset</button>
${logado.tipo==='master'?`<button onclick="deletar(${i})">Del</button>`:''}`;
elLista.appendChild(li);
});
}

function mostrarExtras(){
elPedidos.innerHTML='';
pedidosReset.forEach(p=>{
let li=document.createElement('li'); li.innerText=p;
elPedidos.appendChild(li);
});

elMsgs.innerHTML='';
mensagens.forEach(m=>{
let li=document.createElement('li'); li.innerText=m;
elMsgs.appendChild(li);
});
}

function reset(i){
let alvo=usuarios[i];
if(logado.tipo==='editor' && (alvo.tipo==='admin'||alvo.tipo==='master')) return alert('Sem permissão');
if(logado.tipo==='admin' && alvo.tipo==='master') return alert('Sem permissão');

alvo.pass='123';
salvar();
alert('Senha resetada');
listar();
}

function deletar(i){
if(logado.tipo!=='master') return alert('Só master');
usuarios.splice(i,1);
salvar();
listar();
}

function criarUser(){
if(!(logado.tipo==='admin'||logado.tipo==='master')) return alert('Sem permissão');
usuarios.push({user:elNovoUser.value, pass:elNovaSenha.value, tipo:elTipoUser.value});
salvar();
listar();
}

function mostrarCliente(){
if(!logado) return alert('Login');

elLogin.style.display='none';
elCliente.style.display='block';

fetch('https://api.ipify.org?format=json')
.then(r=>r.json())
.then(d=>elIP.innerText=d.ip);
}

function trocarSenha(){
let n=prompt('Nova senha');
logado.pass=n;
salvar();
alert('Alterada');
}

function esqueciSenha(){
pedidosReset.push(elUser.value);
salvar();
alert('Pedido enviado ao master (simulado)');
}

function suporte(){
let m=prompt('Mensagem');
mensagens.push(m);
salvar();
alert('Mensagem enviada ao master (simulado)');
}

function logout(){
logado=null;
elLogin.style.display='block';
elPainel.style.display='none';
elCliente.style.display='none';
}

// TESTE AUTOMÁTICO SIMPLES
console.log('Teste sistema carregado');
</script>

</body>
</html>
