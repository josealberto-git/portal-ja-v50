<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PORTAL ULTRA PRO</title>

<style>
body{background:black;color:#00ff9c;font-family:monospace}
button,input{margin:5px;padding:8px;background:#111;color:#0f0;border:1px solid #0f0}
.section{display:none;padding:20px}
.active{display:block}
</style>

</head>

<body>

<h1>PORTAL ULTRA PRO</h1>

<button onclick="mostrar('login')">Login</button>
<button onclick="mostrar('cliente')">Cliente</button>
<button onclick="mostrar('admin')">Admin</button>

<!-- LOGIN -->
<div id="login" class="section active">

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<h3>Criar conta</h3>
<input id="novoEmail">
<input id="novaSenha">
<button onclick="registrar()">Registrar</button>

<h3>Resetar senha</h3>
<input id="resetEmail">
<button onclick="resetSenha()">Enviar email</button>

</div>

<!-- CLIENTE -->
<div id="cliente" class="section">

<h2>Área Cliente</h2>

<input id="novaSenhaUser" placeholder="Nova senha">
<button onclick="trocarSenha()">Trocar senha</button>

</div>

<!-- ADMIN -->
<div id="admin" class="section">

<h2>Painel Admin</h2>

<h3>Usuários</h3>
<ul id="listaUsers"></ul>

</div>

<script type="module">

// 🔥 COLE SUA CONFIG DO FIREBASE AQUI
const firebaseConfig = {
apiKey: "SUA_KEY",
authDomain: "SEU_DOMINIO",
projectId: "SEU_PROJECT_ID",
appId: "SEU_APP_ID"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
sendPasswordResetEmail,
updatePassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)

/* UI */
window.mostrar = (id)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* LOGIN */
window.login = async ()=>{
try{
await signInWithEmailAndPassword(auth,email.value,senha.value)
alert("Logado!")
}catch(e){
alert(e.message)
}
}

/* REGISTRAR */
window.registrar = async ()=>{
try{

let userCred = await createUserWithEmailAndPassword(auth,novoEmail.value,novaSenha.value)

await addDoc(collection(db,"usuarios"),{
email:novoEmail.value,
tipo:"cliente"
})

alert("Conta criada!")

}catch(e){
alert(e.message)
}
}

/* RESET EMAIL REAL */
window.resetSenha = async ()=>{
try{
await sendPasswordResetEmail(auth,resetEmail.value)
alert("Email enviado!")
}catch(e){
alert(e.message)
}
}

/* TROCAR SENHA LOGADO */
window.trocarSenha = async ()=>{
try{
await updatePassword(auth.currentUser,novaSenhaUser.value)
alert("Senha alterada!")
}catch(e){
alert(e.message)
}
}

/* ADMIN LISTAR */
async function carregarUsers(){

let snap = await getDocs(collection(db,"usuarios"))

listaUsers.innerHTML=""

snap.forEach(doc=>{
let d = doc.data()

listaUsers.innerHTML += `
<li>${d.email} (${d.tipo})</li>
`
})

}

/* DETECTAR LOGIN */
onAuthStateChanged(auth, async (user)=>{

if(user){

console.log("logado:", user.email)

if(user.email === "SEUEMAIL@ADMIN.COM"){
mostrar("admin")
await carregarUsers()
}else{
mostrar("cliente")
}

}else{
mostrar("login")
}

})

</script>

</body>
</html>
