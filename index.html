<script>

/* ================= SISTEMA ================= */

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || []

let usuarioLogado = JSON.parse(sessionStorage.getItem("logado")) || null

/* CRIA MASTER SE NÃO EXISTIR */
if(!usuarios.find(u=>u.user==="master")){
usuarios.push({
user:"master",
senha:hash("123"),
tipo:"master"
})
salvar()
}

/* HASH SIMPLES */
function hash(s){
return btoa(s + "segredo123")
}

/* SALVAR */
function salvar(){
localStorage.setItem("usuarios",JSON.stringify(usuarios))
}

/* LOGIN */
function login(){

let u = user.value.trim()
let s = senha.value.trim()

let encontrado = usuarios.find(x=>x.user===u && x.senha===hash(s))

if(!encontrado){
status.innerText="Login inválido"
return
}

usuarioLogado = encontrado

sessionStorage.setItem("logado",JSON.stringify(encontrado))

document.getElementById("userLogado").innerText =
"👤 "+encontrado.user+" ("+encontrado.tipo+")"

if(encontrado.tipo!=="cliente"){
menuAdmin.style.display="block"
}

status.innerText="Bem-vindo"

mostrar("cliente")
atualizar()

}

/* AUTO LOGIN */
if(usuarioLogado){
document.getElementById("userLogado").innerText =
"👤 "+usuarioLogado.user+" ("+usuarioLogado.tipo+")"

if(usuarioLogado.tipo!=="cliente"){
menuAdmin.style.display="block"
}
}

/* ESQUECI SENHA (SIMULADO) */
function solicitarSenha(){

let u = document.getElementById("userReset").value.trim()

if(!u){
alert("Digite seu usuário")
return
}

let userObj = usuarios.find(x=>x.user===u)

if(!userObj){
alert("Usuário não encontrado")
return
}

/* GERA TOKEN */
let token = Math.random().toString(36).substring(2)

userObj.resetToken = token
userObj.expira = Date.now() + (1000 * 60 * 10)

salvar()

alert("Token gerado (simulação): " + token)

/* EM SISTEMA REAL IA POR EMAIL */

}

/* RESET COM TOKEN */
function redefinirSenha(){

let u = prompt("Usuário:")
let token = prompt("Token:")
let nova = prompt("Nova senha:")

let userObj = usuarios.find(x=>x.user===u)

if(!userObj){
alert("Usuário não existe")
return
}

if(userObj.resetToken !== token || Date.now() > userObj.expira){
alert("Token inválido ou expirado")
return
}

userObj.senha = hash(nova)
delete userObj.resetToken
delete userObj.expira

salvar()

alert("Senha redefinida")

}

/* SEGURANÇA DE TELA */
function mostrar(id){

if(id!=="login" && !usuarioLogado){
alert("Faça login")
return
}

document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* ADMIN */
function criarUsuario(){

if(usuarioLogado.tipo!=="master"){
alert("Apenas MASTER")
return
}

if(!novoUser.value || !novaSenha.value){
alert("Preencha tudo")
return
}

usuarios.push({
user:novoUser.value.trim(),
senha:hash(novaSenha.value.trim()),
tipo:tipoUser.value
})

salvar()
atualizar()

}

/* DELETAR */
function deletarUsuario(){

if(usuarioLogado.tipo!=="master"){
alert("Apenas MASTER")
return
}

usuarios = usuarios.filter(x=>x.user!==delUser.value)

salvar()
atualizar()

}

/* CATEGORIA */
function mudarCategoria(){

if(usuarioLogado.tipo!=="master"){
alert("Apenas MASTER")
return
}

let u = usuarios.find(x=>x.user===catUser.value)

if(!u){
alert("Usuário não encontrado")
return
}

u.tipo = novaCat.value

salvar()
atualizar()

}

/* RESET ADMIN */
function resetarSenha(){

if(usuarioLogado.tipo==="cliente"){
alert("Sem permissão")
return
}

let alvo = usuarios.find(x=>x.user===resetUser.value)

if(!alvo){
alert("Usuário não existe")
return
}

alvo.senha = hash(novaReset.value)

salvar()
alert("Senha alterada")

}

/* LISTA */
function atualizar(){

listaUsers.innerHTML=""

usuarios.forEach(u=>{
listaUsers.innerHTML += `<li>${u.user} (${u.tipo})</li>`
})

}

/* RESTO IGUAL */
function abrir(url){window.open(url)}
function abrirNav(){iframeNav.src=urlNav.value}

function ip(){
fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>ip.innerText=d.ip)
}

function calc(op){
let a=parseFloat(n1.value)
let b=parseFloat(n2.value)
if(op=="+") res.innerText=a+b
if(op=="-") res.innerText=a-b
if(op=="*") res.innerText=a*b
if(op=="/") res.innerText=a/b
}

function yt(){
let link=linkYT.value.trim()
if(!link){alert("Cole o link");return}
let id=link.split("v=")[1]
ytRes.innerHTML="<a target='_blank' href='https://ytmp3.nu/"+id+"'>Baixar MP3</a>"
}

</script>
