<!-- HTML igual ao anterior até a seção de scripts -->
<script>
// MATRIX
let canvas=document.getElementById("matrix"), ctx=canvas.getContext("2d");
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let letters="0123456789ABCDEF", font=16, columns=Math.floor(canvas.width/font), drops=[];
for(let x=0;x<columns;x++) drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0f0"; ctx.font=font+"px monospace";
for(let i=0;i<drops.length;i++){
ctx.fillText(letters[Math.floor(Math.random()*letters.length)],i*font,drops[i]*font);
drops[i]++;
if(drops[i]*font>canvas.height && Math.random()>0.975) drops[i]=0;
}}
setInterval(draw,50);

// USUÁRIOS
let usuarios = [
{user:"master", senha:"123", tipo:"master"},
{user:"admin", senha:"123", tipo:"admin"},
{user:"cliente", senha:"123", tipo:"cliente"}
];
let usuarioLogado = null;
let solicitacoes = [];

// MOSTRAR SEÇÃO
function mostrar(id){
if(id!="login" && !usuarioLogado){alert("Faça login"); return;}
document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(usuarioLogado && usuarioLogado.tipo!=="cliente") document.getElementById("menuAdmin").style.display="block";
else document.getElementById("menuAdmin").style.display="none";
if(id==="admin") atualizarLista();
if(id==="admin") mostrarSolicitacoes();
}

// LOGIN
function login(){
let u=document.getElementById("user").value.trim();
let s=document.getElementById("senha").value.trim();
let encontrado=usuarios.find(x=>x.user===u && x.senha===s);
if(!encontrado){document.getElementById("status").innerText="Login inválido"; return;}
usuarioLogado=encontrado;
document.getElementById("status").innerText="Bem-vindo "+u;
mostrar("cliente");
}

// LOGOUT
function logout(){usuarioLogado=null; mostrar("login");}

// ESQUECI SENHA
function esqueciSenha(){
let u=document.getElementById("user").value.trim();
if(!u){alert("Digite seu usuário"); return;}
if(!usuarios.find(x=>x.user===u)){alert("Usuário não existe"); return;}
solicitacoes.push({cliente:u, alvo:u});
document.getElementById("solicitacoesLogin").innerHTML="Solicitação enviada para ADM/Master!";
alert("Solicitação enviada para ADM/Master.");
}

// CRIAR USUÁRIO (Apenas MASTER)
function criarUsuario(){
if(!usuarioLogado || usuarioLogado.tipo!=="master"){alert("Apenas MASTER pode criar usuários"); return;}
let u=document.getElementById("novoUser").value.trim();
let s=document.getElementById("novaSenha").value.trim();
let t=document.getElementById("tipoUser").value;
if(!u||!s){alert("Preencha tudo"); return;}
if(usuarios.find(x=>x.user===u)){alert("Usuário já existe"); return;}
usuarios.push({user:u,senha:s,tipo:t});
alert("Usuário criado");
document.getElementById("novoUser").value="";
document.getElementById("novaSenha").value="";
atualizarLista();
}

// DELETAR USUÁRIO (Apenas MASTER)
function deletarUsuario(){
if(!usuarioLogado || usuarioLogado.tipo!=="master"){alert("Apenas MASTER pode deletar usuários"); return;}
let alvo=document.getElementById("delUser").value.trim();
if(!alvo){alert("Digite usuário"); return;}
if(alvo===usuarioLogado.user){alert("Não pode deletar você mesmo"); return;}
let index=usuarios.findIndex(u=>u.user===alvo);
if(index===-1){alert("Usuário não encontrado"); return;}
usuarios.splice(index,1);
alert("Usuário deletado: "+alvo);
document.getElementById("delUser").value="";
atualizarLista();
}

// REDIFINIR SENHA
function resetarSenha(){
if(!usuarioLogado){alert("Faça login"); return;}
let u=document.getElementById("resetUser").value.trim();
let s=document.getElementById("resetSenha").value.trim();
if(!u||!s){alert("Preencha os campos"); return;}
let alvo=usuarios.find(x=>x.user===u);
if(!alvo){alert("Usuário não encontrado"); return;}
if(usuarioLogado.tipo==="admin" && alvo.tipo==="master"){alert("Admin não pode redefinir senha de MASTER"); return;}
if(usuarioLogado.tipo==="cliente"){alert("Cliente não pode redefinir senha"); return;}
alvo.senha=s;
alert("Senha redefinida para "+s);
document.getElementById("resetUser").value="";
document.getElementById("resetSenha").value="";
atualizarLista();
}

// SOLICITAÇÃO CLIENTE
function solicitarRedefinicao(){
if(!usuarioLogado || usuarioLogado.tipo!=="cliente"){alert("Apenas clientes podem solicitar"); return;}
let alvo=document.getElementById("reqUser").value.trim();
if(!alvo){alert("Digite um usuário"); return;}
if(!usuarios.find(x=>x.user===alvo)){alert("Usuário não existe"); return;}
solicitacoes.push({cliente:usuarioLogado.user, alvo:alvo});
document.getElementById("solicitacoes").innerHTML += "<p>Solicitação enviada para: "+alvo+"</p>";
document.getElementById("reqUser").value="";
}

// MOSTRAR SOLICITAÇÕES ADMIN
function mostrarSolicitacoes(){
let div=document.getElementById("requestsAdmin"); div.innerHTML="";
solicitacoes.forEach((s,i)=>{
div.innerHTML += `<p>${s.cliente} solicitou redefinição para ${s.alvo} <button onclick="resetSenhaSolic('${s.alvo}',${i})">Resetar para 123</button></p>`;
});
}

// RESET SENHA PELO ADMIN/MASTER
function resetSenhaSolic(user,i){
let u=usuarios.find(x=>x.user===user);
if(!u){alert("Usuário não encontrado"); return;}
if(usuarioLogado.tipo==="admin" && u.tipo==="master"){alert("Admin não pode resetar MASTER"); return;}
u.senha="123"; 
alert("Senha resetada para 123");
solicitacoes.splice(i,1);
mostrarSolicitacoes();
atualizarLista();
}

// ATUALIZAR LISTA DE USUÁRIOS
function atualizarLista(){
let ul=document.getElementById("listaUsers"); ul.innerHTML="";
usuarios.forEach(u=>{ul.innerHTML+="<li>"+u.user+" ("+u.tipo+")</li>";});
}

// FERRAMENTAS CLIENTE
function ip(){document.getElementById("ip").innerText="Seu IP: 192.168.0.1 (simulado)";}
function calc(op){
let a=parseFloat(document.getElementById("n1").value);
let b=parseFloat(document.getElementById("n2").value);
let r=0;
if(op=='+') r=a+b;
if(op=='-') r=a-b;
if(op=='*') r=a*b;
if(op=='/') r=a/b;
document.getElementById("res").innerText=r;
}
function abrirNav(){document.getElementById("iframeNav").src=document.getElementById("urlNav").value;}
</script>
