<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Completo Funcional</title>
<style>
body{margin:0;background:black;color:#0f0;font-family:Arial;text-align:center;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}
.box{margin-top:80px}
input,button,select{padding:10px;margin:5px;background:#111;color:#0f0;border:1px solid #0f0}
#painel,#cliente{display:none}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="box" id="login">
<h2>Login</h2>
<input id="user" placeholder="Usuário"><br>
<input id="pass" type="password" placeholder="Senha"><br>
<button onclick="fazerLogin()">Entrar</button>
<button onclick="esqueci()">Esqueci senha</button>
<button onclick="suporte()">Suporte</button>
</div>

<div class="box" id="painel">
<h2>👑 Painel Admin</h2>
<p id="info"></p>
<ul id="lista"></ul>

<h3>Criar usuário</h3>
<input id="novoUser" placeholder="Usuário">
<input id="novaSenha" placeholder="Senha">
<select id="tipo">
<option value="cliente">Cliente</option>
<option value="editor">Editor</option>
<option value="admin">Admin</option>
</select>
<button onclick="criar()">Criar</button>

<h3>Pedidos de senha</h3>
<ul id="pedidos"></ul>

<h3>Mensagens</h3>
<ul id="msgs"></ul>

<button onclick="logout()">Sair</button>
</div>

<div class="box" id="cliente">
<h2>Área do Cliente</h2>
<p>IP: <span id="ip"></span></p>
<button onclick="trocarSenha()">Trocar senha</button>
<button onclick="logout()">Sair</button>
</div>

<script>
// MATRIX
const c=document.getElementById('matrix');
const ctx=c.getContext('2d');
c.height=innerHeight;c.width=innerWidth;
let letters="01".split("");
let drops=[];for(let x=0;x<c.width/14;x++)drops[x]=1;
setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#0f0";ctx.font="14px monospace";
drops.forEach((d,i)=>{
let t=letters[Math.random()*letters.length|0];
ctx.fillText(t,i*14,d*14);
if(d*14>c.height&&Math.random()>0.975)drops[i]=0;
drops[i]++;
});
},33);

// SISTEMA
let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [
{user:'josé',pass:'1925',tipo:'master'}
];
let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
let msgs = JSON.parse(localStorage.getItem('msgs')) || [];
let logado=null;

function salvar(){
localStorage.setItem('usuarios',JSON.stringify(usuarios));
localStorage.setItem('pedidos',JSON.stringify(pedidos));
localStorage.setItem('msgs',JSON.stringify(msgs));
}

function fazerLogin(){
let u=user.value.trim();
let p=pass.value.trim();
let ok=usuarios.find(x=>x.user===u&&x.pass===p);

if(ok){
logado=ok;
if(ok.tipo==='cliente') abrirCliente(); else abrirPainel();
}else alert('Login errado');
}

function abrirPainel(){
login.style.display='none';
painel.style.display='block';
info.innerText='Logado: '+logado.user+' ('+logado.tipo+')';
listar();
mostrarExtras();
}

function abrirCliente(){
login.style.display='none';
cliente.style.display='block';
fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>ip.innerText=d.ip);
}

function listar(){
lista.innerHTML='';
usuarios.forEach((u,i)=>{
let li=document.createElement('li');
li.innerHTML=`${u.user} (${u.tipo})
<button onclick="reset(${i})">Reset</button>
${logado.tipo==='master'?`<button onclick="del(${i})">Del</button>`:''}`;
lista.appendChild(li);
});
}

function reset(i){
if(logado.tipo==='editor'&&(usuarios[i].tipo==='admin'||usuarios[i].tipo==='master'))return alert('Sem permissão');
if(logado.tipo==='admin'&&usuarios[i].tipo==='master')return alert('Sem permissão');
usuarios[i].pass='123';salvar();listar();
}

function del(i){
if(logado.tipo!=='master')return alert('Só master');
usuarios.splice(i,1);salvar();listar();
}

function criar(){
if(!(logado.tipo==='admin'||logado.tipo==='master'))return alert('Sem permissão');
usuarios.push({user:novoUser.value,pass:novaSenha.value,tipo:tipo.value});
salvar();listar();
}

function mostrarExtras(){
pedidos.innerHTML=pedidos.map(p=>'<li>'+p+'</li>').join('');
msgs.innerHTML=msgs.map(m=>'<li>'+m+'</li>').join('');
}

function trocarSenha(){
let n=prompt('Nova senha');
logado.pass=n;salvar();
}

function esqueci(){
pedidos.push(user.value||'desconhecido');salvar();alert('Pedido enviado');
}

function suporte(){
let m=prompt('Mensagem');if(m){msgs.push(m);salvar();alert('Enviado');}
}

function logout(){
logado=null;
login.style.display='block';
painel.style.display='none';
cliente.style.display='none';
}
</script>

</body>
</html>
